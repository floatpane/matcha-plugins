name: Plugin Security Scan

on:
  pull_request:
    paths:
      - 'plugins/**/*.lua'
  push:
    paths:
      - 'plugins/**/*.lua'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run security scan
        id: scan
        run: |
          node scripts/scan-plugin.js ${{ github.event.pull_request.number || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const scanResult = JSON.parse(process.env.SCAN_RESULT || '{}');
            
            let comment = '## 🔍 Security Scan Results\n\n';
            
            if (scanResult.status === 'clean') {
              comment += '✅ **Status**: Clean - No issues detected\n\n';
              comment += 'This plugin has passed automated security checks and can be merged.';
            } else if (scanResult.status === 'warning') {
              comment += '⚠️ **Status**: Warnings detected\n\n';
              comment += '**Issues found:**\n';
              scanResult.issues.forEach(issue => {
                comment += `- ${issue}\n`;
              });
              comment += '\n📋 This requires manual review before merging.';
            } else {
              comment += '🚨 **Status**: Suspicious patterns detected\n\n';
              comment += '**Critical issues:**\n';
              scanResult.issues.forEach(issue => {
                comment += `- ${issue}\n`;
              });
              comment += '\n❌ This plugin cannot be merged without thorough manual review.';
            }
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Auto-merge if clean and trusted
        if: steps.scan.outputs.is_clean == 'true' && steps.scan.outputs.is_trusted == 'true'
        uses: pascalgn/automerge-action@v0.15.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_LABELS: 'auto-merge'
          MERGE_METHOD: 'squash'
